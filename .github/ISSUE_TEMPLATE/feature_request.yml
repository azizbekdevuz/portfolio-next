name: Feature or improvement
description: Suggest a small, concrete improvement to the portfolio
title: "[idea] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        This is a **personal** portfolio, not a product. Large rewrites or generic “add X framework” ideas are likely to be closed without a prior discussion.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change (concrete)
      description: Which area of the app (e.g. cockpit, projects, i18n) and rough approach.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I am willing to open a PR if the approach is agreed
          required: false
